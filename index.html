<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon-48.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0F1815" />

    <!-- Perf: descobre os recursos do hero já no HTML inicial, sem esperar o JS.
         Fundo do hero (elemento LCP) + fontes acima da dobra (h1 serif + corpo). -->
    <link rel="preload" as="image" href="/fundo.webp" fetchpriority="high" />
    <link
      rel="preload"
      as="font"
      type="font/woff2"
      href="/fonts/cormorant-garamond-latin-500-normal.woff2"
      crossorigin
    />
    <link
      rel="preload"
      as="font"
      type="font/woff2"
      href="/fonts/cormorant-garamond-latin-400-italic.woff2"
      crossorigin
    />
    <link
      rel="preload"
      as="font"
      type="font/woff2"
      href="/fonts/inter-latin-400-normal.woff2"
      crossorigin
    />

    <!-- SEO por rota: injetado estaticamente no build (SSG via react-helmet-async,
         ver scripts/prerender.mjs). Em dev, o helmet preenche em runtime. -->
    <!--app-head-->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
